  address = "Room 201-134, Building C9, Phase II, Wuhan Software New City, No. 8 Huacheng Avenue, East Lake High-tech Development Zone, Wuhan, China"
  phone = "+86-13986053927"
  email = "info@cyrentis.com"
  google_tag_id = "G-H32XFR8H0R"
  icp_license = "鄂ICP备2024048791号-3"
  default_description = "Cyrentis provides surveillance radar, electro-optical and RF detection products, plus integration-ready software and engineering support for site security and low-altitude awareness."
  default_social_image = "/images/home_horizon_2.png"
  default_social_image_alt = "Cyrentis surveillance radar, EO/IR, and RF detection solutions for integrated site monitoring."
  default_keywords = ["Cyrentis", "surveillance radar", "EO/IR systems", "electro-optical systems", "RF detection", "drone detection radar", "site security sensors", "low-altitude awareness"]

