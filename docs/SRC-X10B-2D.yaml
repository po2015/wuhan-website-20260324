content:
  summary: 'The SRC-X10B-2D Low-Altitude Surveillance Radar is an
    intelligent detection 3D radar. It can rapidly detect and continuously track targets
    such as UAVs, aircraft, vehicles and birds. It is widely used in critical sites
    to prevent hazards caused by aerial intruders and birds. Utilizing simultaneous
    multi-beam technology and high-performance signal processing techniques, this
    radar can rapidly and accurately acquire target position and motion states even
    in complex, dense multi-target environments. The radar employs a continuous wave
    operation mode with low transmission power, significantly enhancing its resistance
    to stability compared to pulse-based systems. Within a cooperative detection system,
    this radar can serve as the core sensing unit, providing high-precision target
    data to other sensors (such as electro-optical devices, bird dispersal equipment)
    to achieve precise guidance.'
  key_features:
  - "Wide Detection Range: Capable of detecting small UAVs (RCS 0.01 m²) at distances up to 10 km, providing early warning and ample response time."
  - 'Strong Tracking Capability: By adopting advanced tracking filtering algorithms,
    it has significantly improved its target tracking performance.'
  - 'Effective Small Target Detection: Utilizing a Frequency Modulated Continuous
    Wave (FMCW) system, it avoids the signal-to-noise ratio mutation issues caused
    by waveform handover in pulse radars, ensuring continuous detection of very small
    targets (such as the DJI Mini 3) at all elevation angles.'
  application_scenarios: *id001
