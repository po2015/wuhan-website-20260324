content:
  summary: The radar SRC-C03A-1G mainly consists of one radar array and one power
    adapter. It uses MIMO and DBF technology to effectively remove false alarm clutter.
    The product ismainly used for monitoring the detection, warning, and target indication
    of ships in coastaland inland areas, and can accurately provide target trajectory
    information.
  key_features:
  - 'Real time monitoring: Monitor the surrounding environment, promptly detect andrespond
    to abnormal situations.'
  - 'Strong fast target monitoring capability: high data refresh rate, able to continuouslyand
    stably track rapidly moving targets.'
  - 'Wide coverage: It can cover a large area, and multiple radars can also conduct
    seriesarrays to further expand the monitoring range and achieve seamless supervision
    ofoffshore and inland areas.'
  - 'Easy to install: Can be completed using lamp poles or original infrastructure.'
