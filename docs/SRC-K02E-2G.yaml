content:
  summary: The SRC-K02E-2G moving target surveillance radar is specifically designed
    for the detection and real-time tracking of moving targets on the ground and water
    surfaces. It serves as an all-weather, day-and-night efficient surveillance system,
    capable of stable operation even in complex environments and harsh weather conditions.
    Employing a Digital Beamforming (DBF) system, the radar can accurately detect
    and track various types of targets, providing detailed information such as distance,
    speed, azimuth, and type. It features functions including boundary crossing alerts,
    early warnings, and recording capabilities.
  key_features:
  - Accurate detection and stable tracking;.
  - low false alarm rate;.
  - strong multi-target tracking capability;.
  - all-weather stable operation;.
  application_scenarios:
  - Land border surveillance
  - maritime surveillance
  - critical site protection
  - port monitoring
