<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Counter-UAS workflow diagram</title>
  <desc id="desc">A four-step counter-UAS workflow from detect to assess to decide to respond.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg2)"/>
  <g font-family="Manrope, Noto Sans SC, sans-serif">
    <text x="88" y="80" font-size="30" font-weight="800" fill="#0f172a">Counter-UAS is a workflow, not one box</text>
    <text x="88" y="112" font-size="16" fill="#475569">Each stage answers a different question before any response is chosen.</text>
  </g>

  <g filter="url(#shadow2)" font-family="Manrope, Noto Sans SC, sans-serif">
    <rect x="72" y="176" width="184" height="186" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="286" y="176" width="184" height="186" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="500" y="176" width="184" height="186" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="714" y="176" width="184" height="186" rx="26" fill="#ffffff" stroke="#cbd5e1"/>

    <text x="164" y="216" text-anchor="middle" font-size="15" font-weight="800" fill="#0284c7">1</text>
    <text x="378" y="216" text-anchor="middle" font-size="15" font-weight="800" fill="#0284c7">2</text>
    <text x="592" y="216" text-anchor="middle" font-size="15" font-weight="800" fill="#0284c7">3</text>
    <text x="806" y="216" text-anchor="middle" font-size="15" font-weight="800" fill="#0284c7">4</text>

    <text x="164" y="250" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Detect</text>
    <text x="378" y="250" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Assess</text>
    <text x="592" y="250" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Decide</text>
    <text x="806" y="250" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Respond</text>

    <text x="116" y="292" font-size="15" fill="#475569">
      <tspan x="116" dy="0">Find a possible drone</tspan>
      <tspan x="116" dy="24">or control signal.</tspan>
    </text>
    <text x="330" y="292" font-size="15" fill="#475569">
      <tspan x="330" dy="0">Check whether the</tspan>
      <tspan x="330" dy="24">event is real, relevant,</tspan>
      <tspan x="330" dy="24">and near the site.</tspan>
    </text>
    <text x="544" y="292" font-size="15" fill="#475569">
      <tspan x="544" dy="0">Choose who acts,</tspan>
      <tspan x="544" dy="24">what authority applies,</tspan>
      <tspan x="544" dy="24">and what matters now.</tspan>
    </text>
    <text x="758" y="292" font-size="15" fill="#475569">
      <tspan x="758" dy="0">Report, protect,</tspan>
      <tspan x="758" dy="24">mitigate, or hand off</tspan>
      <tspan x="758" dy="24">to the right team.</tspan>
    </text>
  </g>

  <g stroke="#38bdf8" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="269" x2="286" y2="269"/>
    <line x1="470" y1="269" x2="500" y2="269"/>
    <line x1="684" y1="269" x2="714" y2="269"/>
  </g>
</svg>
