<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Counter-UAS sensor roles comparison</title>
  <desc id="desc">A comparison table showing what radar, RF, and EO-IR are best at in a counter-UAS system.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg3)"/>
  <g font-family="Manrope, Noto Sans SC, sans-serif">
    <text x="88" y="78" font-size="30" font-weight="800" fill="#0f172a">Different sensors answer different questions</text>
    <text x="88" y="110" font-size="16" fill="#475569">A good counter-UAS system combines them instead of forcing one layer to do every job.</text>
  </g>

  <g filter="url(#shadow3)" font-family="Manrope, Noto Sans SC, sans-serif">
    <rect x="74" y="154" width="812" height="308" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="74" y="154" width="812" height="74" rx="28" fill="#e0f2fe"/>
    <rect x="74" y="214" width="812" height="1" fill="#cbd5e1"/>
    <rect x="274" y="154" width="1" height="308" fill="#cbd5e1"/>
    <rect x="494" y="154" width="1" height="308" fill="#cbd5e1"/>
    <rect x="704" y="154" width="1" height="308" fill="#cbd5e1"/>
    <rect x="74" y="296" width="812" height="1" fill="#cbd5e1"/>
    <rect x="74" y="378" width="812" height="1" fill="#cbd5e1"/>

    <text x="174" y="198" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">Question</text>
    <text x="384" y="198" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">Radar</text>
    <text x="599" y="198" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">RF</text>
    <text x="795" y="198" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">EO / IR</text>

    <text x="96" y="256" font-size="16" font-weight="800" fill="#0f172a">Best at</text>
    <text x="96" y="338" font-size="16" font-weight="800" fill="#0f172a">Weak spot</text>
    <text x="96" y="420" font-size="16" font-weight="800" fill="#0f172a">Typical output</text>

    <text x="294" y="256" font-size="15" fill="#475569">
      <tspan x="294" dy="0">Finding physical</tspan>
      <tspan x="294" dy="22">presence and motion</tspan>
    </text>
    <text x="514" y="256" font-size="15" fill="#475569">
      <tspan x="514" dy="0">Finding emitters and</tspan>
      <tspan x="514" dy="22">wireless activity</tspan>
    </text>
    <text x="724" y="256" font-size="15" fill="#475569">
      <tspan x="724" dy="0">Confirming what the</tspan>
      <tspan x="724" dy="22">operator should look at</tspan>
    </text>

    <text x="294" y="338" font-size="15" fill="#475569">
      <tspan x="294" dy="0">Does not always tell</tspan>
      <tspan x="294" dy="22">you exactly what it is</tspan>
    </text>
    <text x="514" y="338" font-size="15" fill="#475569">
      <tspan x="514" dy="0">Silent or autonomous</tspan>
      <tspan x="514" dy="22">targets may vanish</tspan>
    </text>
    <text x="724" y="338" font-size="15" fill="#475569">
      <tspan x="724" dy="0">Needs line of sight</tspan>
      <tspan x="724" dy="22">and operator attention</tspan>
    </text>

    <text x="294" y="420" font-size="15" fill="#475569">
      <tspan x="294" dy="0">Track, range, speed,</tspan>
      <tspan x="294" dy="22">sector alert</tspan>
    </text>
    <text x="514" y="420" font-size="15" fill="#475569">
      <tspan x="514" dy="0">Band, protocol clue,</tspan>
      <tspan x="514" dy="22">direction or ID hint</tspan>
    </text>
    <text x="724" y="420" font-size="15" fill="#475569">
      <tspan x="724" dy="0">Visual confirmation,</tspan>
      <tspan x="724" dy="22">imagery, evidence</tspan>
    </text>
  </g>
</svg>
