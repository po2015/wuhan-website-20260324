<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Layered counter-UAS illustration</title>
  <desc id="desc">A protected site in the center with radar, RF, EO-IR, and command layers arranged around it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)"/>
  <circle cx="480" cy="270" r="170" fill="none" stroke="#bfdbfe" stroke-width="2"/>
  <circle cx="480" cy="270" r="124" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="8 10"/>
  <circle cx="480" cy="270" r="78" fill="none" stroke="#38bdf8" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="392" y="186" width="176" height="168" rx="28" fill="url(#card)" stroke="#cbd5e1"/>
  </g>
  <rect x="430" y="286" width="100" height="38" rx="10" fill="#1d4ed8" opacity="0.12"/>
  <rect x="448" y="250" width="64" height="52" rx="10" fill="#0f172a"/>
  <rect x="462" y="224" width="36" height="30" rx="8" fill="#1e293b"/>
  <rect x="470" y="206" width="20" height="20" rx="4" fill="#475569"/>
  <rect x="444" y="304" width="72" height="10" rx="5" fill="#334155"/>
  <text x="480" y="340" text-anchor="middle" font-family="Manrope, Noto Sans SC, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Protected Site</text>

  <g filter="url(#shadow)">
    <rect x="102" y="110" width="176" height="86" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="682" y="110" width="176" height="86" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="102" y="344" width="176" height="86" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="682" y="344" width="176" height="86" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <g font-family="Manrope, Noto Sans SC, sans-serif" fill="#0f172a" text-anchor="middle">
    <text x="190" y="146" font-size="16" font-weight="800">Radar</text>
    <text x="190" y="171" font-size="13" fill="#475569">Physical presence</text>

    <text x="770" y="146" font-size="16" font-weight="800">RF</text>
    <text x="770" y="171" font-size="13" fill="#475569">Signal awareness</text>

    <text x="190" y="380" font-size="16" font-weight="800">EO / IR</text>
    <text x="190" y="405" font-size="13" fill="#475569">Visual confirmation</text>

    <text x="770" y="380" font-size="16" font-weight="800">Command</text>
    <text x="770" y="405" font-size="13" fill="#475569">Decision workflow</text>
  </g>

  <g stroke="#38bdf8" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M278 153 C342 170 362 182 404 220"/>
    <path d="M682 153 C618 170 598 182 556 220"/>
    <path d="M278 387 C342 370 362 358 404 320"/>
    <path d="M682 387 C618 370 598 358 556 320"/>
  </g>
</svg>
