<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is Pulse-Doppler Radar cover</title>
  <desc id="desc">Foundation cover with a pulse-Doppler radar scene, moving target tracks, and short summary tags.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#13476f"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcff"/>
      <stop offset="100%" stop-color="#e3f4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#03121d" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1016" cy="112" r="108" fill="#53b8ff" opacity="0.09"/>
  <circle cx="1102" cy="508" r="150" fill="#0a2437" opacity="0.34"/>
  <path d="M0 548c196-56 304-12 440-38s228-136 360-138 206 96 400 74V630H0Z" fill="#0a2437" opacity="0.62"/>
  <g filter="url(#shadow)">
    <rect x="100" y="84" width="648" height="112" rx="24" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.3"/>
  </g>
  <text x="132" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="132" y="172" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="39" font-weight="700">What is Pulse-Doppler Radar?</text>
  <text x="100" y="272" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Range from pulse timing, speed from Doppler shift</text>
  <text x="100" y="316" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="100" dy="0">A moving target stands out when the radar compares pulse echoes</tspan>
    <tspan x="100" dy="28">over time and separates motion from stronger static clutter.</tspan>
  </text>
  <g transform="translate(100 390)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="176" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Pulse timing</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Range</text>
  </g>
  <g transform="translate(302 390)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="186" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Doppler shift</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Radial speed</text>
  </g>
  <g transform="translate(516 390)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="194" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Clutter filter</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Moving targets</text>
  </g>
  <g transform="translate(714 120)">
    <ellipse cx="250" cy="394" rx="268" ry="80" fill="#061827" opacity="0.44"/>
    <path d="M220 348c86-102 188-156 318-162" fill="none" stroke="#64c2ff" stroke-width="4" stroke-dasharray="10 12"/>
    <path d="M220 348c98-58 210-88 340-90" fill="none" stroke="#64c2ff" stroke-width="4" stroke-dasharray="10 12" opacity="0.72"/>
    <path d="M220 348c108-24 214-28 326-8" fill="none" stroke="#64c2ff" stroke-width="4" stroke-dasharray="10 12" opacity="0.5"/>
    <circle cx="520" cy="166" r="12" fill="#7fd1ff"/>
    <circle cx="564" cy="252" r="12" fill="#7fd1ff"/>
    <path d="M476 164h54" stroke="#9bdbff" stroke-width="5" stroke-linecap="round"/>
    <path d="M522 160 548 144" stroke="#9bdbff" stroke-width="5" stroke-linecap="round"/>
    <path d="M516 250h60" stroke="#9bdbff" stroke-width="5" stroke-linecap="round"/>
    <path d="M564 246 590 228" stroke="#9bdbff" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(126 236)">
      <rect x="0" y="0" width="112" height="102" rx="18" fill="#123754" stroke="#89d0ff" stroke-width="4"/>
      <rect x="20" y="18" width="72" height="46" rx="10" fill="#dff1ff" stroke="#8fd3ff" stroke-width="3"/>
      <rect x="42" y="102" width="28" height="42" rx="10" fill="#184564" stroke="#8fd3ff" stroke-width="3"/>
      <path d="M56 64v38" stroke="#9bdbff" stroke-width="5" stroke-linecap="round"/>
      <path d="M54 110 8 144M58 110 104 144" stroke="#9bdbff" stroke-width="10" stroke-linecap="round"/>
      <path d="M-14 44c64 0 116-52 116-116" fill="none" stroke="#6fc8ff" stroke-width="5" stroke-dasharray="8 10"/>
      <path d="M-24 54c80 0 146-66 146-146" fill="none" stroke="#6fc8ff" stroke-width="5" stroke-dasharray="8 10" opacity="0.6"/>
    </g>
  </g>
</svg>
