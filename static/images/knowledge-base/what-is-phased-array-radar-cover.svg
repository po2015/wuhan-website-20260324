<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is Phased Array Radar cover</title>
  <desc id="desc">Foundation cover with a phased array panel, electronically steered beams, and short summary tags.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#13476f"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcff"/>
      <stop offset="100%" stop-color="#e3f4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#03121d" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1018" cy="116" r="108" fill="#53b8ff" opacity="0.09"/>
  <circle cx="1094" cy="512" r="154" fill="#0a2437" opacity="0.34"/>
  <path d="M0 546c188-54 304-12 440-38s228-136 360-138 206 96 400 76V630H0Z" fill="#0a2437" opacity="0.62"/>
  <g filter="url(#shadow)">
    <rect x="100" y="86" width="652" height="108" rx="24" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.3"/>
  </g>
  <text x="132" y="128" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="132" y="168" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">What is Phased Array Radar?</text>
  <text x="100" y="264" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Electronic beam steering from a fixed antenna face</text>
  <text x="100" y="308" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="100" dy="0">The array does not rotate to move the beam. It shifts phase across</tspan>
    <tspan x="100" dy="28">many elements so the radar can point and revisit quickly.</tspan>
  </text>
  <g transform="translate(100 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="172" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Fixed array</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">No dish sweep</text>
  </g>
  <g transform="translate(296 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="188" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Phase control</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Beam steering</text>
  </g>
  <g transform="translate(510 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="186" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Fast revisit</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Agile search</text>
  </g>
  <g transform="translate(722 120)">
    <ellipse cx="242" cy="394" rx="262" ry="80" fill="#061827" opacity="0.44"/>
    <g filter="url(#shadow)">
      <rect x="74" y="178" width="176" height="172" rx="24" fill="#10314d" stroke="#85d0ff" stroke-width="4"/>
    </g>
    <path d="M104 206h116M104 238h116M104 270h116M104 302h116" stroke="#79c9ff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M132 188v152M162 188v152M192 188v152" stroke="#79c9ff" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    <rect x="138" y="350" width="48" height="46" rx="12" fill="#164564" stroke="#8bd2ff" stroke-width="4"/>
    <path d="M162 350v-28" stroke="#9bdbff" stroke-width="5" stroke-linecap="round"/>
    <path d="M250 258c116-96 222-138 336-140" fill="none" stroke="#67c0ff" stroke-width="5" stroke-dasharray="9 12"/>
    <path d="M250 258c130-48 238-54 354-20" fill="none" stroke="#67c0ff" stroke-width="5" stroke-dasharray="9 12" opacity="0.8"/>
    <path d="M250 258c126 10 234 42 330 100" fill="none" stroke="#67c0ff" stroke-width="5" stroke-dasharray="9 12" opacity="0.55"/>
    <circle cx="538" cy="118" r="12" fill="#7fd1ff"/>
    <circle cx="578" cy="238" r="12" fill="#7fd1ff"/>
    <circle cx="540" cy="356" r="12" fill="#7fd1ff"/>
  </g>
</svg>
