<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is Drone Identification cover</title>
  <desc id="desc">Foundation cover showing a drone event connected to Remote ID, visual confirmation, and operational context.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#154c74"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#dff1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#02111c" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1054" cy="110" r="98" fill="#4eb8ff" opacity="0.10"/>
  <circle cx="1112" cy="510" r="154" fill="#79cbff" opacity="0.08"/>
  <path d="M0 526c178-42 304-8 430-34s198-118 326-122 232 88 444 66V630H0Z" fill="#0a2437" opacity="0.64"/>

  <g filter="url(#shadow)">
    <rect x="92" y="82" width="450" height="108" rx="26" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.32"/>
  </g>
  <text x="124" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="124" y="166" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="39" font-weight="700">What is Drone Identification?</text>

  <text x="96" y="266" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Stronger evidence than detection alone</text>
  <text x="96" y="310" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="96" dy="0">A drone event becomes identified when broadcast, sensor, and</tspan>
    <tspan x="96" dy="28">authorization evidence combine into an actionable understanding.</tspan>
  </text>

  <g transform="translate(96 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="172" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Remote ID path</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Fusion-based path</text>
  </g>
  <g transform="translate(286 418)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="194" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Detection is not enough</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Tracking is not enough</text>
  </g>

  <g transform="translate(732 126)">
    <ellipse cx="216" cy="294" rx="232" ry="56" fill="#061827" opacity="0.50"/>
    <g transform="translate(168 122)">
      <circle cx="0" cy="0" r="14" fill="#79d0ff"/>
      <path d="M0-24v-18" stroke="#9bdbff" stroke-width="4" stroke-linecap="round"/>
      <circle cx="0" cy="44" r="46" fill="#10314d" stroke="#8bd2ff" stroke-width="4"/>
      <rect x="-20" y="86" width="40" height="46" rx="10" fill="#164564" stroke="#8bd2ff" stroke-width="3"/>
      <path d="M-26 62-72 88M26 62 72 88M-22 104-68 128M22 104 68 128" stroke="#9bdbff" stroke-width="10" stroke-linecap="round"/>
    </g>
    <path d="M142 164c-70-58-96-84-118-116" fill="none" stroke="#7fd1ff" stroke-width="4" stroke-dasharray="8 10"/>
    <path d="M190 164c76-42 142-62 210-78" fill="none" stroke="#7fd1ff" stroke-width="4" stroke-dasharray="8 10"/>
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="120" height="48" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="28" y="31" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Remote ID</text>
    <g filter="url(#shadow)">
      <rect x="274" y="46" width="130" height="48" rx="18" fill="#0f304b" stroke="#7ed0ff" stroke-width="3"/>
    </g>
    <text x="304" y="77" fill="#dff2ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">EO / RF / track</text>
    <g filter="url(#shadow)">
      <rect x="128" y="236" width="176" height="52" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="154" y="269" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Actionable identity</text>
  </g>
</svg>
