    <text x="154" y="372" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Authorization</text>
    <text x="286" y="372" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Geo-awareness</text>
    <text x="154" y="400" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Traffic info</text>
    <text x="286" y="400" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Network ID</text>
