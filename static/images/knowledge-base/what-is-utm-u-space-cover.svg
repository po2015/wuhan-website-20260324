    <path d="M168 314c90-86 198-126 312-110" fill="none" stroke="#6dc5ff" stroke-width="4" stroke-dasharray="9 12"/>
    <path d="M120 238c72-52 162-70 252-58" fill="none" stroke="#6dc5ff" stroke-width="4" stroke-dasharray="9 12"/>
    <path d="M278 224c40-54 98-92 172-110" fill="none" stroke="#6dc5ff" stroke-width="4" stroke-dasharray="9 12"/>
    <g transform="translate(64 206)">
      <circle cx="0" cy="0" r="14" fill="#79d0ff"/>
      <path d="M0-24v-18" stroke="#9bdbff" stroke-width="4" stroke-linecap="round"/>
      <circle cx="0" cy="44" r="46" fill="#10314d" stroke="#8bd2ff" stroke-width="4"/>
      <rect x="-20" y="86" width="40" height="46" rx="10" fill="#164564" stroke="#8bd2ff" stroke-width="3"/>
      <path d="M-26 62-72 88M26 62 72 88M-22 104-68 128M22 104 68 128" stroke="#9bdbff" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g transform="translate(362 148)">
      <circle cx="0" cy="0" r="14" fill="#79d0ff"/>
      <path d="M0-24v-18" stroke="#9bdbff" stroke-width="4" stroke-linecap="round"/>
      <circle cx="0" cy="44" r="46" fill="#10314d" stroke="#8bd2ff" stroke-width="4"/>
      <rect x="-20" y="86" width="40" height="46" rx="10" fill="#164564" stroke="#8bd2ff" stroke-width="3"/>
      <path d="M-26 62-72 88M26 62 72 88M-22 104-68 128M22 104 68 128" stroke="#9bdbff" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g filter="url(#shadow)">
      <rect x="184" y="126" width="148" height="92" rx="24" fill="url(#chip)" stroke="#90ceff" stroke-width="3"/>
    </g>
    <text x="212" y="162" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">SERVICE</text>
    <text x="212" y="190" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">LAYER</text>
