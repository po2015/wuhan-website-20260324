<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is a Command-and-Control Platform cover</title>
  <desc id="desc">Foundation cover showing a command platform connecting sensors, maps, tasks, and decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#154c74"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#dff1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#02111c" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1054" cy="110" r="98" fill="#4eb8ff" opacity="0.10"/>
  <circle cx="1112" cy="510" r="154" fill="#79cbff" opacity="0.08"/>
  <path d="M0 526c178-42 304-8 430-34s198-118 326-122 232 88 444 66V630H0Z" fill="#0a2437" opacity="0.64"/>

  <g filter="url(#shadow)">
    <rect x="92" y="82" width="588" height="108" rx="26" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.32"/>
  </g>
  <text x="124" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="124" y="166" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">What is a Command-and-Control Platform?</text>

  <text x="96" y="266" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">A coordination layer for sensors, people, and response</text>
  <text x="96" y="310" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="96" dy="0">The platform matters when it turns alerts, maps, and operators into</tspan>
    <tspan x="96" dy="28">shared decisions, tasking, and a trusted incident record.</tspan>
  </text>

  <g transform="translate(96 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="164" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Shared view</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Task coordination</text>
  </g>
  <g transform="translate(282 418)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="198" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Role-based control</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Trusted incident state</text>
  </g>

  <g transform="translate(720 126)">
    <ellipse cx="228" cy="300" rx="240" ry="56" fill="#061827" opacity="0.50"/>
    <g filter="url(#shadow)">
      <rect x="120" y="86" width="168" height="80" rx="24" fill="#0f304b" stroke="#7ed0ff" stroke-width="3"/>
    </g>
    <text x="146" y="120" fill="#dff2ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">C2 Platform</text>
    <text x="146" y="148" fill="#dff2ff" font-family="Segoe UI, Arial, sans-serif" font-size="16">Correlate + act</text>
    <g filter="url(#shadow)">
      <rect x="0" y="30" width="96" height="44" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="24" y="59" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Sensors</text>
    <g filter="url(#shadow)">
      <rect x="316" y="24" width="96" height="44" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="346" y="53" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Map</text>
    <g filter="url(#shadow)">
      <rect x="12" y="208" width="110" height="44" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="36" y="237" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Tasks</text>
    <g filter="url(#shadow)">
      <rect x="306" y="212" width="112" height="44" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="330" y="241" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Decisions</text>
    <path d="M96 52 120 92M316 52 286 92M122 230 166 166M306 234 256 166" fill="none" stroke="#7fd1ff" stroke-width="4" stroke-dasharray="8 10"/>
  </g>
</svg>
