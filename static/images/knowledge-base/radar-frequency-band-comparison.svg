<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none" role="img" aria-label="Radar frequency band comparison chart">
  <rect width="1200" height="720" fill="#F8FAFC"/>
  <rect x="60" y="52" width="1080" height="616" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="96" y="110" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0F172A">Radar Frequency Band Comparison</text>
  <text x="96" y="146" font-family="Arial, sans-serif" font-size="20" fill="#475569">Relative balance of weather robustness, target detail, and deployment distance.</text>

  <line x1="140" y1="590" x2="1060" y2="590" stroke="#94A3B8" stroke-width="2"/>
  <line x1="140" y1="220" x2="140" y2="590" stroke="#94A3B8" stroke-width="2"/>

  <text x="90" y="230" font-family="Arial, sans-serif" font-size="16" fill="#64748B">High</text>
  <text x="90" y="400" font-family="Arial, sans-serif" font-size="16" fill="#64748B">Medium</text>
  <text x="90" y="588" font-family="Arial, sans-serif" font-size="16" fill="#64748B">Low</text>

  <rect x="240" y="320" width="160" height="270" rx="14" fill="#2563EB"/>
  <rect x="520" y="270" width="160" height="320" rx="14" fill="#0EA5E9"/>
  <rect x="800" y="220" width="160" height="370" rx="14" fill="#0891B2"/>

  <text x="300" y="620" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A" text-anchor="middle">C Band</text>
  <text x="300" y="648" font-family="Arial, sans-serif" font-size="17" fill="#475569" text-anchor="middle">Best weather tolerance</text>

  <text x="600" y="620" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A" text-anchor="middle">X Band</text>
  <text x="600" y="648" font-family="Arial, sans-serif" font-size="17" fill="#475569" text-anchor="middle">Balanced all-round option</text>

  <text x="880" y="620" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A" text-anchor="middle">Ku Band</text>
  <text x="880" y="648" font-family="Arial, sans-serif" font-size="17" fill="#475569" text-anchor="middle">Highest small-target detail</text>

  <rect x="210" y="190" width="820" height="24" rx="12" fill="#E2E8F0"/>
  <rect x="210" y="190" width="300" height="24" rx="12" fill="#2563EB"/>
  <rect x="510" y="190" width="260" height="24" rx="12" fill="#0EA5E9"/>
  <rect x="770" y="190" width="260" height="24" rx="12" fill="#0891B2"/>
  <text x="210" y="178" font-family="Arial, sans-serif" font-size="15" fill="#334155">Typical use focus by band</text>
</svg>
