<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is a PTZ / EO-IR Camera System cover</title>
  <desc id="desc">Foundation cover showing a PTZ EO/IR observation head with visible and thermal viewing cues.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#13476f"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcff"/>
      <stop offset="100%" stop-color="#e3f4ff"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#17344f"/>
      <stop offset="52%" stop-color="#ffd04e"/>
      <stop offset="80%" stop-color="#ff8740"/>
      <stop offset="100%" stop-color="#ff5650"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#03121d" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="116" r="108" fill="#53b8ff" opacity="0.09"/>
  <circle cx="1098" cy="514" r="154" fill="#0a2437" opacity="0.34"/>
  <path d="M0 546c192-54 304-12 442-38s228-136 356-138 206 96 402 76V630H0Z" fill="#0a2437" opacity="0.62"/>
  <g filter="url(#shadow)">
    <rect x="100" y="84" width="778" height="112" rx="24" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.3"/>
  </g>
  <text x="132" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="132" y="172" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">What is a PTZ / EO-IR Camera System?</text>
  <text x="100" y="264" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Steerable viewing with visible and thermal channels</text>
  <text x="100" y="308" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="100" dy="0">Pan, tilt, and zoom help the operator point at the right place, while</tspan>
    <tspan x="100" dy="28">visible and infrared channels keep the scene usable across conditions.</tspan>
  </text>
  <g transform="translate(100 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="178" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Pan / tilt</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Fast pointing</text>
  </g>
  <g transform="translate(306 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="194" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Optical zoom</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Detail on cue</text>
  </g>
  <g transform="translate(528 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="210" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Visible + thermal</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Day and night</text>
  </g>
  <g transform="translate(732 116)">
    <ellipse cx="232" cy="398" rx="246" ry="78" fill="#061827" opacity="0.44"/>
    <g filter="url(#shadow)">
      <rect x="24" y="180" width="148" height="104" rx="24" fill="#10314d" stroke="#88d1ff" stroke-width="4"/>
    </g>
    <circle cx="84" cy="232" r="22" fill="#0a1828" stroke="#a0deff" stroke-width="4"/>
    <path d="M112 232h46" stroke="#9bdbff" stroke-width="5" stroke-linecap="round"/>
    <rect x="132" y="220" width="50" height="24" rx="12" fill="#dff1ff"/>
    <path d="M54 178c-42-18-72-46-88-84" fill="none" stroke="#69c4ff" stroke-width="5" stroke-dasharray="8 10"/>
    <path d="M54 286c-42 18-72 46-88 84" fill="none" stroke="#69c4ff" stroke-width="5" stroke-dasharray="8 10"/>
    <g filter="url(#shadow)">
      <rect x="234" y="122" width="220" height="136" rx="24" fill="#11314c" stroke="#8ad1ff" stroke-width="4"/>
    </g>
    <rect x="252" y="140" width="184" height="100" rx="16" fill="url(#heat)"/>
    <circle cx="300" cy="188" r="20" fill="#ffe27a"/>
    <rect x="284" y="206" width="32" height="48" rx="16" fill="#ff9440"/>
    <rect x="336" y="174" width="44" height="74" rx="16" fill="#ff6e3d"/>
    <rect x="388" y="160" width="18" height="88" rx="9" fill="#ffd34f"/>
    <g filter="url(#shadow)">
      <rect x="258" y="284" width="184" height="96" rx="22" fill="#0f304b" stroke="#5ab9ff" stroke-width="3"/>
    </g>
    <text x="286" y="318" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">OBSERVATION HEAD</text>
    <text x="286" y="346" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="17">Visible zoom channel</text>
    <text x="286" y="372" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="17">Thermal channel</text>
  </g>
</svg>
