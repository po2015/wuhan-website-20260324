<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Remote ID compliance paths</title>
  <desc id="desc">Three light comparison cards for built-in Remote ID, broadcast module, and FRIA or local exception.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#9cbddd" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="960" height="460" rx="28" fill="url(#bg)"/>
  <text x="60" y="64" fill="#12324d" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Common Remote ID compliance paths</text>
  <text x="60" y="98" fill="#52708a" font-family="Segoe UI, Arial, sans-serif" font-size="18">A lighter overview of the beginner paths most people need to distinguish.</text>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(74 146)">
      <rect x="0" y="0" width="240" height="212" rx="26" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <circle cx="120" cy="44" r="16" fill="#5ac8ff"/>
      <text x="120" y="92" text-anchor="middle" fill="#143e60" font-size="24" font-weight="700">Built-in RID</text>
      <text x="120" y="132" text-anchor="middle" fill="#4d6a84" font-size="18">Native aircraft capability</text>
      <text x="120" y="166" text-anchor="middle" fill="#4d6a84" font-size="18">Usually the cleanest path</text>
    </g>
    <g transform="translate(360 146)">
      <rect x="0" y="0" width="240" height="212" rx="26" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <circle cx="120" cy="44" r="16" fill="#5ac8ff"/>
      <text x="120" y="92" text-anchor="middle" fill="#143e60" font-size="24" font-weight="700">Module</text>
      <text x="120" y="132" text-anchor="middle" fill="#4d6a84" font-size="18">Retrofit for older aircraft</text>
      <text x="120" y="166" text-anchor="middle" fill="#4d6a84" font-size="18">Often adds operating limits</text>
    </g>
    <g transform="translate(646 146)">
      <rect x="0" y="0" width="240" height="212" rx="26" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <circle cx="120" cy="44" r="16" fill="#5ac8ff"/>
      <text x="120" y="92" text-anchor="middle" fill="#143e60" font-size="24" font-weight="700">FRIA / exception</text>
      <text x="120" y="132" text-anchor="middle" fill="#4d6a84" font-size="18">Geographic rule path</text>
      <text x="120" y="166" text-anchor="middle" fill="#4d6a84" font-size="18">Not a hardware upgrade</text>
    </g>
  </g>
</svg>
