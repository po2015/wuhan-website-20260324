<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is Radar Resolution cover</title>
  <desc id="desc">Foundation cover showing a radar beam, range cells, and target separation across distance and angle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#154c74"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#dff1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#02111c" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1056" cy="110" r="98" fill="#4eb8ff" opacity="0.10"/>
  <circle cx="1112" cy="510" r="154" fill="#79cbff" opacity="0.08"/>
  <path d="M0 526c172-42 304-8 430-34s198-118 326-122 232 88 444 66V630H0Z" fill="#0a2437" opacity="0.64"/>

  <g filter="url(#shadow)">
    <rect x="92" y="82" width="428" height="108" rx="26" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.32"/>
  </g>
  <text x="124" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="124" y="166" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="39" font-weight="700">What is Radar Resolution?</text>

  <text x="96" y="266" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">How well the radar separates nearby targets</text>
  <text x="96" y="310" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="96" dy="0">Resolution is about target separation, not just detection range or</tspan>
    <tspan x="96" dy="28">location accuracy. Beamwidth and range cells define the detail level.</tspan>
  </text>

  <g transform="translate(96 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="168" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Range separation</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Angular separation</text>
  </g>
  <g transform="translate(286 418)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="194" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Not the same as range</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Not the same as accuracy</text>
  </g>

  <g transform="translate(726 128)">
    <ellipse cx="222" cy="294" rx="236" ry="56" fill="#061827" opacity="0.50"/>
    <path d="M20 244 244 178" fill="none" stroke="#7fd1ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M20 244 244 246" fill="none" stroke="#7fd1ff" stroke-width="8" stroke-linecap="round" stroke-opacity="0.42"/>
    <path d="M20 244 244 314" fill="none" stroke="#7fd1ff" stroke-width="8" stroke-linecap="round" stroke-opacity="0.22"/>
    <rect x="0" y="228" width="18" height="34" rx="8" fill="#9ad9ff"/>
    <g filter="url(#shadow)">
      <rect x="264" y="146" width="132" height="50" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="294" y="178" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Range cells</text>
    <rect x="282" y="226" width="124" height="72" rx="18" fill="#0f304b" stroke="#7ed0ff" stroke-width="3"/>
    <circle cx="314" cy="262" r="10" fill="#7fd1ff"/>
    <circle cx="356" cy="262" r="10" fill="#7fd1ff"/>
    <text x="300" y="290" fill="#dff2ff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Separate returns</text>
  </g>
</svg>
