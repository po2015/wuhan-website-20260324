<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is RF Geolocation Pilot Positioning cover</title>
  <desc id="desc">Foundation cover showing multiple RF receivers estimating the likely location of a pilot or emitter.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#13476f"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcff"/>
      <stop offset="100%" stop-color="#e3f4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#03121d" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1018" cy="116" r="108" fill="#53b8ff" opacity="0.09"/>
  <circle cx="1100" cy="514" r="152" fill="#0a2437" opacity="0.34"/>
  <path d="M0 546c192-54 304-12 442-38s228-136 356-138 206 96 402 76V630H0Z" fill="#0a2437" opacity="0.62"/>
  <g filter="url(#shadow)">
    <rect x="100" y="84" width="770" height="112" rx="24" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.3"/>
  </g>
  <text x="132" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="132" y="172" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="35" font-weight="700">What is RF Geolocation / Pilot Positioning?</text>
  <text x="100" y="264" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Fuse RF measurements into a likely source location</text>
  <text x="100" y="308" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="100" dy="0">Multiple receivers, timing or bearing measurements, and good geometry</tspan>
    <tspan x="100" dy="28">turn RF activity into a map cue for the probable control source.</tspan>
  </text>
  <g transform="translate(100 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="186" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Multi-site input</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">AOA / TDOA</text>
  </g>
  <g transform="translate(312 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="196" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Emitter estimate</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Probable area</text>
  </g>
  <g transform="translate(536 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="84" rx="22" fill="url(#chip)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Not identity</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Still needs context</text>
  </g>
  <g transform="translate(724 118)">
    <ellipse cx="240" cy="394" rx="258" ry="80" fill="#061827" opacity="0.44"/>
    <path d="M80 286h340M80 244h340M80 202h340" stroke="#1d4f75" stroke-width="3" opacity="0.6"/>
    <path d="M106 162v198M176 162v198M246 162v198M316 162v198M386 162v198" stroke="#1d4f75" stroke-width="3" opacity="0.6"/>
    <g filter="url(#shadow)">
      <circle cx="114" cy="304" r="22" fill="#10314d" stroke="#8bd2ff" stroke-width="4"/>
      <circle cx="246" cy="190" r="22" fill="#10314d" stroke="#8bd2ff" stroke-width="4"/>
      <circle cx="362" cy="314" r="22" fill="#10314d" stroke="#8bd2ff" stroke-width="4"/>
    </g>
    <path d="M114 304c80-40 164-74 246-102" fill="none" stroke="#67c0ff" stroke-width="4" stroke-dasharray="9 12"/>
    <path d="M246 190c20 58 62 106 114 142" fill="none" stroke="#67c0ff" stroke-width="4" stroke-dasharray="9 12"/>
    <path d="M362 314c-42-10-82-8-120 6" fill="none" stroke="#67c0ff" stroke-width="4" stroke-dasharray="9 12"/>
    <g filter="url(#shadow)">
      <path d="M252 248c18-22 52-26 74-8 22 18 26 52 8 74-18 22-52 26-74 8-22-18-26-52-8-74z" fill="#dff1ff" stroke="#8ad1ff" stroke-width="4"/>
    </g>
    <circle cx="289" cy="285" r="10" fill="#ff6d57"/>
    <text x="264" y="340" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">likely source</text>
  </g>
</svg>
