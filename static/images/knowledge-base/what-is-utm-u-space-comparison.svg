<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">UTM vs U-space vs ATC</title>
  <desc id="desc">A lighter three-column comparison of UTM, U-space, and traditional ATC.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#9cbddd" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/>
  <text x="60" y="64" fill="#12324d" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">UTM vs U-space vs traditional ATC</text>
  <text x="60" y="98" fill="#52708a" font-family="Segoe UI, Arial, sans-serif" font-size="18">A short comparison of coordination models rather than a long text infographic.</text>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(72 150)">
      <rect x="0" y="0" width="248" height="228" rx="26" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <text x="124" y="56" text-anchor="middle" fill="#143e60" font-size="24" font-weight="700">UTM</text>
      <text x="124" y="108" text-anchor="middle" fill="#4d6a84" font-size="18">Broad low-altitude</text>
      <text x="124" y="136" text-anchor="middle" fill="#4d6a84" font-size="18">drone coordination idea</text>
      <text x="124" y="186" text-anchor="middle" fill="#4d6a84" font-size="18">Planning</text>
      <text x="124" y="212" text-anchor="middle" fill="#4d6a84" font-size="18">Approvals</text>
      <text x="124" y="238" text-anchor="middle" fill="#4d6a84" font-size="18">Shared data</text>
    </g>
    <g transform="translate(356 150)">
      <rect x="0" y="0" width="248" height="228" rx="26" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <text x="124" y="56" text-anchor="middle" fill="#143e60" font-size="24" font-weight="700">U-space</text>
      <text x="124" y="108" text-anchor="middle" fill="#4d6a84" font-size="18">European framework for</text>
      <text x="124" y="136" text-anchor="middle" fill="#4d6a84" font-size="18">designated airspace</text>
      <text x="124" y="186" text-anchor="middle" fill="#4d6a84" font-size="18">Named services</text>
      <text x="124" y="212" text-anchor="middle" fill="#4d6a84" font-size="18">Provider roles</text>
      <text x="124" y="238" text-anchor="middle" fill="#4d6a84" font-size="18">Regulated workflows</text>
    </g>
    <g transform="translate(640 150)">
      <rect x="0" y="0" width="248" height="228" rx="26" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <text x="124" y="56" text-anchor="middle" fill="#143e60" font-size="24" font-weight="700">Traditional ATC</text>
      <text x="124" y="108" text-anchor="middle" fill="#4d6a84" font-size="18">Conventional crewed</text>
      <text x="124" y="136" text-anchor="middle" fill="#4d6a84" font-size="18">aviation control model</text>
      <text x="124" y="186" text-anchor="middle" fill="#4d6a84" font-size="18">Controller services</text>
      <text x="124" y="212" text-anchor="middle" fill="#4d6a84" font-size="18">Structured separation</text>
      <text x="124" y="238" text-anchor="middle" fill="#4d6a84" font-size="18">Voice-heavy coordination</text>
    </g>
  </g>
  <text x="480" y="444" text-anchor="middle" fill="#12324d" font-family="Segoe UI, Arial, sans-serif" font-size="18">UTM and U-space complement aviation management, but they are not just smaller copies of ATC.</text>
</svg>
