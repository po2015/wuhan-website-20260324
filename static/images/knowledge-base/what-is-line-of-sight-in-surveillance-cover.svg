<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is Line of Sight in Surveillance cover</title>
  <desc id="desc">Foundation cover showing a surveillance mast with clear and blocked viewing paths across terrain and obstacles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#154c74"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#dff1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#02111c" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="108" r="98" fill="#4eb8ff" opacity="0.10"/>
  <circle cx="1110" cy="510" r="152" fill="#79cbff" opacity="0.08"/>
  <path d="M0 532c186-44 326-8 438-44s170-120 302-124 226 92 460 70V630H0Z" fill="#0a2437" opacity="0.64"/>

  <g filter="url(#shadow)">
    <rect x="92" y="82" width="628" height="108" rx="26" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.32"/>
  </g>
  <text x="124" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="124" y="166" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="39" font-weight="700">What is Line of Sight in Surveillance?</text>

  <text x="96" y="266" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Coverage depends on geometry, not range alone</text>
  <text x="96" y="310" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="96" dy="0">A sensor may be powerful on paper, but terrain, obstacles, height,</tspan>
    <tspan x="96" dy="28">and viewing angle decide what it can really observe in the field.</tspan>
  </text>

  <g transform="translate(96 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="176" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Clear path matters</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Blind zones persist</text>
  </g>
  <g transform="translate(290 418)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="188" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Height changes detail</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Obstacles change reach</text>
  </g>

  <g transform="translate(736 128)">
    <ellipse cx="210" cy="288" rx="232" ry="54" fill="#061827" opacity="0.50"/>
    <path d="M0 236c54-54 112-98 188-120 62-18 132-18 232 14v120H0Z" fill="#123955"/>
    <path d="M72 244c34-20 66-26 102-18 36 8 72 8 114-10 24-10 50-18 78-22 22-2 42 0 54 6v44H72Z" fill="#295c79"/>
    <rect x="24" y="150" width="18" height="112" rx="8" fill="#9ad9ff"/>
    <rect x="6" y="136" width="54" height="18" rx="8" fill="#9ad9ff"/>
    <circle cx="34" cy="130" r="16" fill="#eff6ff" stroke="#8fcdff" stroke-width="3"/>
    <path d="M50 126 208 118" fill="none" stroke="#7fd1ff" stroke-width="5" stroke-dasharray="10 12"/>
    <path d="M50 138 214 176" fill="none" stroke="#f59e0b" stroke-width="5" stroke-dasharray="10 12"/>
    <rect x="198" y="92" width="24" height="136" rx="10" fill="#18384f"/>
    <rect x="330" y="124" width="28" height="112" rx="10" fill="#18384f"/>
    <g filter="url(#shadow)">
      <rect x="210" y="40" width="112" height="44" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="232" y="68" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Clear LOS</text>
    <g filter="url(#shadow)">
      <rect x="240" y="258" width="132" height="44" rx="18" fill="#0f304b" stroke="#f59e0b" stroke-width="3"/>
    </g>
    <text x="264" y="286" fill="#ffe7b3" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Masked zone</text>
  </g>
</svg>
