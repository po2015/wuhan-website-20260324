<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Remote ID broadcast elements</title>
  <desc id="desc">A light diagram showing a drone at the center with four short Remote ID data fields around it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#9cbddd" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="28" fill="url(#bg)"/>
  <text x="60" y="64" fill="#12324d" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Remote ID broadcast elements</text>
  <text x="60" y="98" fill="#52708a" font-family="Segoe UI, Arial, sans-serif" font-size="18">Short labels only: the figure shows the core fields, not the full regulatory message format.</text>
  <g transform="translate(480 286)">
    <circle r="76" fill="#10314d" stroke="#8cd0ff" stroke-width="4"/>
    <circle cy="-28" r="18" fill="#57d0ff"/>
    <rect x="-28" y="18" width="56" height="60" rx="12" fill="#164564" stroke="#8cd0ff" stroke-width="4"/>
    <path d="M-40-6-92 22M40-6 92 22M-36 42-90 74M36 42 90 74" stroke="#9bdcff" stroke-width="11" stroke-linecap="round"/>
    <text y="124" text-anchor="middle" fill="#12324d" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">RID drone</text>
  </g>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(172 188)">
      <rect x="0" y="0" width="168" height="74" rx="22" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <text x="84" y="44" text-anchor="middle" fill="#164061" font-size="20" font-weight="700">Identity</text>
    </g>
    <g transform="translate(620 188)">
      <rect x="0" y="0" width="168" height="74" rx="22" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <text x="84" y="44" text-anchor="middle" fill="#164061" font-size="20" font-weight="700">Position</text>
    </g>
    <g transform="translate(172 334)">
      <rect x="0" y="0" width="188" height="74" rx="22" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <text x="94" y="44" text-anchor="middle" fill="#164061" font-size="20" font-weight="700">Pilot / takeoff</text>
    </g>
    <g transform="translate(606 334)">
      <rect x="0" y="0" width="184" height="74" rx="22" fill="#ffffff" stroke="#8fcfff" stroke-width="3"/>
      <text x="92" y="44" text-anchor="middle" fill="#164061" font-size="20" font-weight="700">Time / status</text>
    </g>
  </g>
  <path d="M340 224 404 254" fill="none" stroke="#6dbfff" stroke-width="4" stroke-dasharray="8 12"/>
  <path d="M620 224 556 254" fill="none" stroke="#6dbfff" stroke-width="4" stroke-dasharray="8 12"/>
  <path d="M360 346 414 320" fill="none" stroke="#6dbfff" stroke-width="4" stroke-dasharray="8 12"/>
  <path d="M606 346 550 320" fill="none" stroke="#6dbfff" stroke-width="4" stroke-dasharray="8 12"/>
</svg>
