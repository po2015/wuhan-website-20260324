<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">What is Radar Beamforming cover</title>
  <desc id="desc">Foundation cover showing an antenna array shaping a radar beam with controlled energy and sidelobes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081b2e"/>
      <stop offset="100%" stop-color="#154c74"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#dff1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#02111c" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1054" cy="110" r="98" fill="#4eb8ff" opacity="0.10"/>
  <circle cx="1112" cy="510" r="154" fill="#79cbff" opacity="0.08"/>
  <path d="M0 526c182-44 314-10 438-36s190-118 320-122 232 88 442 66V630H0Z" fill="#0a2437" opacity="0.64"/>

  <g filter="url(#shadow)">
    <rect x="92" y="82" width="454" height="108" rx="26" fill="#0f304b" stroke="#4cb2ff" stroke-opacity="0.32"/>
  </g>
  <text x="124" y="126" fill="#8fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOUNDATION</text>
  <text x="124" y="166" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="39" font-weight="700">What is Radar Beamforming?</text>

  <text x="96" y="266" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">How an array shapes energy into a useful beam</text>
  <text x="96" y="310" fill="#d9edff" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    <tspan x="96" dy="0">Beamforming controls phase and weighting so a radar can focus</tspan>
    <tspan x="96" dy="28">energy, reduce unwanted directions, and steer attention when needed.</tspan>
  </text>

  <g transform="translate(96 392)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="170" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Shape the beam</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Control sidelobes</text>
  </g>
  <g transform="translate(286 418)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="194" height="84" rx="22" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <circle cx="28" cy="30" r="7" fill="#2d9fff"/>
    <text x="46" y="36" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Steer with control</text>
    <circle cx="28" cy="58" r="7" fill="#2d9fff"/>
    <text x="46" y="64" fill="#133653" font-family="Segoe UI, Arial, sans-serif" font-size="18">Architecture matters</text>
  </g>

  <g transform="translate(720 124)">
    <ellipse cx="228" cy="302" rx="242" ry="56" fill="#061827" opacity="0.50"/>
    <g>
      <rect x="26" y="142" width="16" height="156" rx="8" fill="#9ad9ff"/>
      <rect x="52" y="142" width="16" height="156" rx="8" fill="#9ad9ff"/>
      <rect x="78" y="142" width="16" height="156" rx="8" fill="#9ad9ff"/>
      <rect x="104" y="142" width="16" height="156" rx="8" fill="#9ad9ff"/>
      <rect x="130" y="142" width="16" height="156" rx="8" fill="#9ad9ff"/>
      <rect x="156" y="142" width="16" height="156" rx="8" fill="#9ad9ff"/>
    </g>
    <path d="M184 218c84-54 174-84 272-98" fill="none" stroke="#7fd1ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M182 220c80-20 174-18 250 10" fill="none" stroke="#7fd1ff" stroke-width="4" stroke-opacity="0.40" stroke-dasharray="10 12"/>
    <path d="M182 220c76 8 152 36 220 80" fill="none" stroke="#7fd1ff" stroke-width="4" stroke-opacity="0.35" stroke-dasharray="10 12"/>
    <g filter="url(#shadow)">
      <rect x="8" y="64" width="148" height="48" rx="18" fill="url(#panel)" stroke="#8fcdff" stroke-width="3"/>
    </g>
    <text x="36" y="94" fill="#144061" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Array inputs</text>
    <g filter="url(#shadow)">
      <rect x="222" y="70" width="152" height="48" rx="18" fill="#0f304b" stroke="#7ed0ff" stroke-width="3"/>
    </g>
    <text x="250" y="100" fill="#dff2ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Formed beam</text>
  </g>
</svg>
