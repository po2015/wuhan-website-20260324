$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "cyrentis/schemas/src-radar.schema.yaml"
title: "SRC Radar Product Schema"
description: "Schema for Cyrentis SRC radar product data files."
type: object
additionalProperties: false

required:
  - product_family
  - model
  - product_name
  - status
  - naming
  - technical_classification
  - detection
  - content
  - platform_integration

properties:
  product_family:
    type: string
    const: "SRC"
    description: "Product family code. Must be SRC for radar products."
    examples:
      - "SRC"

  product_line_name:
    type: string
    description: "Human-readable product line name."
    default: "Surveillance Radar by Cyrentis"
    examples:
      - "Surveillance Radar by Cyrentis"

  model:
    type: string
    description: "Official product model."
    pattern: "^SRC-[CXK][0-9]{2}[A-E]-[123][DGM]$"
    examples:
      - "SRC-C03A-1G"
      - "SRC-X08B-1D"
      - "SRC-K10C-2M"

  product_name:
    type: string
    description: "Full product name used in website and product documents."
    examples:
      - "SRC-X08B-1D Surveillance Radar"

  status:
    type: string
    description: "Lifecycle status of the product."
    enum:
      - "active"
      - "preview"
      - "legacy"
      - "discontinued"
    examples:
      - "active"

  visibility:
    type: string
    description: "Controls whether the product can be shown publicly."
    enum:
      - "public"
      - "internal"
      - "private"
    default: "public"
    examples:
      - "public"

  featured:
    type: boolean
    description: "Whether the product should appear in featured product sections."
    default: false
    examples:
      - true

  positioning:
    type: object
    additionalProperties: false
    description: "Short marketing and positioning copy."
    properties:
      short:
        type: string
        description: "Short positioning sentence."
        examples:
          - "X-band surveillance radar for low-altitude and perimeter monitoring."
      tagline:
        type: string
        description: "Short tagline for hero or product cards."
        examples:
          - "Reliable radar detection for security monitoring applications."
      primary_role:
        type: string
        description: "Primary functional role of the radar."
        examples:
          - "security surveillance radar"
      application_focus:
        type: array
        description: "Primary application focus areas."
        items:
          type: string
        examples:
          - ["perimeter security", "low-altitude awareness", "facility monitoring"]

  naming:
    type: object
    additionalProperties: false
    required:
      - format
      - band_code
      - detection_level_code
      - architecture_code
      - generation_code
      - purpose_code
    description: "Naming system breakdown."
    properties:
      format:
        type: string
        const: "SRC-[Band][DetectionLevel][Architecture]-[Generation][Purpose]"
      band_code:
        type: string
        enum:
          - "C"
          - "X"
          - "K"
        description: "C = C band, X = X band, K = Ku band"
      detection_level_code:
        type: string
        enum:
          - "01"
          - "02"
          - "03"
          - "04"
          - "05"
          - "08"
          - "10"
          - "16"
          - "12"
          - "25"
          - "50"
        description: "Detection level code written as two digits."
        examples:
          - "01"
          - "02"
          - "03"
          - "04"
          - "05"
          - "08"
          - "10"
          - "16"
          - "12"
          - "25"
          - "50"
      architecture_code:
        type: string
        enum:
          - "A"
          - "B"
          - "C"
          - "D"
          - "E"
        description: "Radar scanning architecture code. A = Azimuth Electronic Scan, B = Mechanical Azimuth Scan + Electronic Elevation Scan, C = Two-Dimensional Electronic Scan (Single-Face AESA), D = 2D Electronic Scan + Mechanical Rotation, E = Four-Face AESA Array."
      generation_code:
        type: string
        enum:
          - "1"
          - "2"
          - "3"
        description: "Generation code. 1 = First Generation, Pulse Doppler. 2 = Second Generation, FMCW. 3 = Third Generation, Pulse Doppler."
      purpose_code:
        type: string
        enum:
          - "D"
          - "G"
          - "M"
        description: "Purpose code. D = Drone detection, G = Ground surveillance, M = Multi-purpose."

  technical_classification:
    type: object
    additionalProperties: false
    required:
      - waveform
      - band
      - scan_architecture
      - target_domains
      - primary_target_types
    description: "Core technical classification fields."
    properties:
      waveform:
        type: object
        additionalProperties: false
        required:
          - code
          - name
        properties:
          code:
            type: string
            enum:
              - "F"
              - "P"
          name:
            type: string
            enum:
              - "FMCW"
              - "Pulse Doppler"
      band:
        type: object
        additionalProperties: false
        required:
          - code
          - name
        properties:
          code:
            type: string
            enum:
              - "C"
              - "X"
              - "K"
          name:
            type: string
            enum:
              - "C band"
              - "X band"
              - "Ku band"
      scan_architecture:
        type: object
        additionalProperties: false
        required:
          - code
          - name
        properties:
          code:
            type: string
            enum:
              - "A"
              - "B"
              - "C"
              - "D"
              - "E"
          name:
            type: string
            enum:
              - "Electronic Azimuth Scanning"
              - "Mechanical Azimuth Scanning + Electronic Elevation Steering"
              - "2D Electronic Scanning (Single-Face AESA)"
              - "Electronic Scanning with Mechanical Rotation"
              - "Four-Face AESA Array"
      target_domains:
        type: array
        description: "High-level target domain categories."
        minItems: 1
        items:
          type: string
          enum:
            - "ground"
            - "air"
            - "maritime"
      primary_target_types:
        type: array
        description: "Typical intended targets for this radar."
        minItems: 1
        items:
          type: string
          enum:
            - "small_uav"
            - "fixed_wing_uav"
            - "human"
            - "vehicle"
            - "boat"

  detection:
    type: object
    additionalProperties: false
    required:
      - nominal_class_km
      - reference_target
      - typical_detection_ranges_km
    description: "Detection performance and reference target information."
    properties:
      nominal_class_km:
        type: number
        enum:
          - 1.5
          - 2
          - 3
          - 4
          - 5
          - 8
          - 10
          - 16
        description: "Nominal radar class distance in kilometers."
      reference_target:
        type: object
        additionalProperties: false
        required:
          - type
          - rcs_m2
        description: "Reference target used for nominal class definition."
        properties:
          type:
            type: string
            enum:
              - "small_uav"
              - "human"
          rcs_m2:
            type: number
            enum:
              - 0.01
              - 0.5
      typical_detection_ranges_km:
        type: object
        additionalProperties: false
        description: "Typical detection ranges by target / RCS class."
        properties:
          small_uav_0_01m2:
            oneOf:
              - type: number
              - type: string
                const: "N/A"
          human_0_5m2:
            type: number
          fixed_wing_uav_1m2:
            type: number
          vehicle_2m2:
            type: number
          boat_10m2:
            type: number
      notes:
        type: array
        description: "Important performance notes."
        items:
          type: string

  performance:
    type: object
    additionalProperties: false
    description: "Operational performance, scan behavior, tracking capacity, and accuracy."
    properties:
      blind_zone_m:
        type:
          - number
          - "null"
        description: "Radar blind zone / minimum effective detection distance in meters."
      horizontal_field_of_view_deg:
        type:
          - number
          - "null"
        description: "Horizontal field of view in degrees."
      vertical_field_of_view_deg:
        type:
          - number
          - "null"
        description: "Vertical field of view in degrees."
      speed_measurement_range_mps:
        type: object
        additionalProperties: false
        description: "Supported radial speed measurement range in meters per second."
        properties:
          min:
            type:
              - number
              - "null"
          max:
            type:
              - number
              - "null"
      rotation_speed_rpm:
        oneOf:
          - type: number
          - type: string
            const: "N/A"
        description: "Default mechanical rotation speed in revolutions per minute (RPM). Use N/A for non-rotating architectures."
        examples:
          - 30
          - 60
          - "N/A"
      rotation_speed_options_rpm:
        oneOf:
          - type: array
            items:
              type: number
            minItems: 1
          - type: string
            const: "N/A"
          - type: "null"
        description: "Available configurable mechanical rotation speed options in RPM. Use N/A for non-rotating architectures."
        examples:
          - [30, 60]
          - [15, 30]
          - "N/A"
      data_update_interval_s:
        type:
          - number
          - "null"
        description: "Data update interval in seconds, typically derived from the scan mode or rotation speed."
      tracking_capacity:
        type: object
        additionalProperties: false
        description: "Simultaneous tracking capacity separated by TWS and TAS modes."
        properties:
          tws_count:
            type:
              - integer
              - "null"
            description: "Track-While-Scan simultaneous track count."
          tas_count:
            oneOf:
              - type: integer
              - type: string
                const: "N/A"
              - type: "null"
            description: "Track-And-Scan simultaneous track count. Only scan architecture types C, D, and E support TAS."
      accuracy:
        type: object
        additionalProperties: false
        description: "Measurement accuracy values."
        properties:
          range_m:
            type:
              - number
              - "null"
            description: "Range accuracy in meters."
          azimuth_deg:
            type:
              - number
              - "null"
            description: "Horizontal / azimuth accuracy in degrees."
          elevation_deg:
            type:
              - number
              - "null"
            description: "Vertical / elevation accuracy in degrees."

  coverage:
    type: object
    additionalProperties: false
    description: "Coverage and scan related fields."
    properties:
      azimuth:
        type: object
        additionalProperties: false
        properties:
          mode:
            type: string
            enum:
              - "electronic"
              - "mechanical"
              - "hybrid"
          coverage_deg:
            type:
              - number
              - "null"
      elevation:
        type: object
        additionalProperties: false
        properties:
          mode:
            type: string
            enum:
              - "electronic"
              - "mechanical"
              - "hybrid"
          coverage_deg:
            type:
              - number
              - "null"
      refresh_rate_s:
        type:
          - number
          - "null"
        description: "Legacy summary refresh interval in seconds. Prefer performance.data_update_interval_s for detailed product data."
      instrumented_range_km:
        type:
          - number
          - "null"

  physical:
    type: object
    additionalProperties: false
    description: "Physical and deployment information."
    properties:
      deployment_type:
        type: string
        enum:
          - "fixed"
          - "portable"
          - "vehicle-mounted"
          - "tripod-mounted"
      mounting_options:
        type: array
        items:
          type: string
      enclosure_rating:
        type:
          - string
          - "null"
        examples:
          - "IP65"
      operating_temperature_c:
        type: object
        additionalProperties: false
        description: "Operating temperature range in degrees Celsius."
        properties:
          min:
            type:
              - number
              - "null"
          max:
            type:
              - number
              - "null"
      dimensions_mm:
        type: object
        additionalProperties: false
        description: "Overall dimensions in millimeters."
        properties:
          length:
            type:
              - number
              - "null"
          width:
            type:
              - number
              - "null"
          height:
            type:
              - number
              - "null"
      weight_kg:
        type:
          - number
          - "null"
        description: "Weight in kilograms."

  interfaces:
    type: object
    additionalProperties: false
    description: "Electrical and communications interfaces."
    properties:
      power_input:
        type:
          - string
          - "null"
        description: "Power input type, typically AC220 or DC."
        examples:
          - "AC220"
          - "24 VDC"
      data_interfaces:
        type: array
        description: "External communication interfaces. Default is Ethernet."
        default:
          - "Ethernet"
        items:
          type: string
        examples:
          - ["Ethernet"]
      power_consumption_w:
        type:
          - number
          - "null"
        description: "Typical power consumption in watts."
      protocol_support:
        type: array
        items:
          type: string
        examples:
          - ["TCP/IP", "custom"]
      horizon_compatible:
        type: boolean
        default: true
      third_party_integration:
        type: boolean
        default: true

  platform_integration:
    type: object
    additionalProperties: false
    required:
      - compatible_platforms
      - supported_modules
      - supports_cueing_to_optics
      - supports_multi_sensor_fusion
    description: "Integration relationship with Cyrentis Horizon and other systems."
    properties:
      compatible_platforms:
        type: array
        items:
          type: string
        examples:
          - ["Cyrentis Horizon"]
      supported_modules:
        type: array
        items:
          type: string
          enum:
            - "Horizon Sense"
            - "Horizon Spatial"
            - "Horizon Fusion"
            - "Horizon Track"
            - "Horizon AI"
            - "Horizon Command"
            - "Horizon Notify"
            - "Horizon Archive"
            - "Horizon Link"
      supports_cueing_to_optics:
        type: boolean
      supports_multi_sensor_fusion:
        type: boolean

  use_cases:
    type: object
    additionalProperties: false
    description: "Typical scenarios for this product."
    properties:
      primary:
        type: array
        items:
          type: string
      secondary:
        type: array
        items:
          type: string

  media:
    type: object
    additionalProperties: false
    description: "Media and downloadable assets."
    properties:
      hero_image:
        type:
          - string
          - "null"
      gallery:
        type: array
        items:
          type: string
      datasheet_pdf:
        type:
          - string
          - "null"

  content:
    type: object
    additionalProperties: false
    required:
      - summary
      - key_features
    description: "Website-facing content fields."
    properties:
      summary:
        type: string
        description: "Concise product summary paragraph."
      key_features:
        type: array
        minItems: 3
        items:
          type: string
      application_scenarios:
        type: array
        items:
          type: string

  export_compliance:
    type: object
    additionalProperties: false
    description: "Export control annotations only for products that trigger the internal small-UAV review threshold."
    required:
      - china_regime
      - civil_security_only
      - general_notice
      - official_basis
      - review_rule
    properties:
      china_regime:
        type: string
        const: "PRC dual-use export control"
        description: "Compliance regime used for radar products exported from China."
      civil_security_only:
        type: boolean
        default: true
        description: "SRC radars are positioned for civil security use only."
      general_notice:
        type: string
        description: "General compliance note used in product records or website copy."
        examples:
          - "This product is intended for civil security use only. Export from China is subject to PRC dual-use export control and licensing procedures."
      official_basis:
        type: array
        description: "Official PRC sources supporting the general compliance notice."
        minItems: 1
        items:
          type: string
          enum:
            - "PRC Dual-Use Export Control List (effective 2024-12-01)"
            - "MOFCOM / GACC / CMC EDD Announcement No. 31 of 2024"
      review_rule:
        type: object
        additionalProperties: false
        description: "Project-specific compliance escalation rule for products at or above the internal 10 km small-UAV threshold."
        required:
          - rule_type
          - measurement_field
          - small_uav_threshold_km
          - triggered
          - control_status
          - license_requirement
        properties:
          rule_type:
            type: string
            const: "internal_compliance_escalation_rule"
          measurement_field:
            type: string
            const: "detection.typical_detection_ranges_km.small_uav_0_01m2"
          small_uav_threshold_km:
            type: number
            const: 10
          triggered:
            type: boolean
            const: true
          control_status:
            type: string
            const: "special_permit_required"
          license_requirement:
            type: string
            const: "special_permit_required"
          reviewer_note:
            type:
              - string
              - "null"
            description: "Manual note for compliance review or export licensing escalation."

  seo:
    type: object
    additionalProperties: false
    description: "SEO metadata."
    properties:
      title:
        type:
          - string
          - "null"
      description:
        type:
          - string
          - "null"
      keywords:
        type: array
        items:
          type: string

  contact:
    type: object
    additionalProperties: false
    description: "Inquiry settings for product pages."
    properties:
      inquiry_enabled:
        type: boolean
        default: true
      recommended_cta:
        type:
          - string
          - "null"
        examples:
          - "Request radar consultation"

allOf:
  - if:
      properties:
        technical_classification:
          properties:
            scan_architecture:
              properties:
                code:
                  enum:
                    - "A"
                    - "C"
                    - "E"
    then:
      properties:
        performance:
          properties:
            rotation_speed_rpm:
              type: string
              const: "N/A"
            rotation_speed_options_rpm:
              type: string
              const: "N/A"
  - if:
      properties:
        technical_classification:
          properties:
            scan_architecture:
              properties:
                code:
                  enum:
                    - "B"
                    - "D"
    then:
      properties:
        performance:
          properties:
            rotation_speed_rpm:
              type:
                - number
                - "null"
            rotation_speed_options_rpm:
              oneOf:
                - type: array
                  items:
                    type: number
                  minItems: 1
                - type: "null"
  - if:
      properties:
        technical_classification:
          properties:
            scan_architecture:
              properties:
                code:
                  enum:
                    - "A"
                    - "B"
    then:
      properties:
        performance:
          properties:
            tracking_capacity:
              properties:
                tas_count:
                  type: string
                  const: "N/A"
  - if:
      properties:
        technical_classification:
          properties:
            scan_architecture:
              properties:
                code:
                  enum:
                    - "C"
                    - "D"
                    - "E"
    then:
      properties:
        performance:
          properties:
            tracking_capacity:
              properties:
                tas_count:
                  type:
                    - integer
                    - "null"
  - if:
      properties:
        detection:
          properties:
            typical_detection_ranges_km:
              required:
                - small_uav_0_01m2
              properties:
                small_uav_0_01m2:
                  type: number
                  minimum: 10
    then:
      required:
        - export_compliance
      properties:
        export_compliance:
          required:
            - china_regime
            - civil_security_only
            - general_notice
            - official_basis
            - review_rule
          properties:
            china_regime:
              const: "PRC dual-use export control"
            civil_security_only:
              const: true
            review_rule:
              required:
                - rule_type
                - measurement_field
                - small_uav_threshold_km
                - triggered
                - control_status
                - license_requirement
              properties:
                rule_type:
                  const: "internal_compliance_escalation_rule"
                measurement_field:
                  const: "detection.typical_detection_ranges_km.small_uav_0_01m2"
                small_uav_threshold_km:
                  const: 10
                triggered:
                  const: true
                control_status:
                  const: "special_permit_required"
                license_requirement:
                  const: "special_permit_required"
  - if:
      not:
        properties:
          detection:
            properties:
              typical_detection_ranges_km:
                required:
                  - small_uav_0_01m2
                properties:
                  small_uav_0_01m2:
                    type: number
                    minimum: 10
    then:
      not:
        required:
          - export_compliance

examples:
  - product_family: "SRC"
    product_line_name: "Surveillance Radar by Cyrentis"
    model: "SRC-X08B-1M"
    product_name: "SRC-X08B-1M Surveillance Radar"
    status: "active"
    visibility: "public"
    featured: true
    naming:
      format: "SRC-[Band][DetectionLevel][Architecture]-[Generation][Purpose]"
      band_code: "X"
      detection_level_code: "08"
      architecture_code: "B"
      generation_code: "1"
      purpose_code: "M"
    technical_classification:
      waveform:
        code: "P"
        name: "Pulse Doppler"
      band:
        code: "X"
        name: "X band"
      scan_architecture:
        code: "B"
        name: "Mechanical azimuth scan + electronic elevation scan"
      target_domains:
        - "ground"
        - "air"
      primary_target_types:
        - "small_uav"
        - "human"
        - "vehicle"
    detection:
      nominal_class_km: 8
      reference_target:
        type: "small_uav"
        rcs_m2: 0.01
      typical_detection_ranges_km:
        small_uav_0_01m2: 8
        human_0_5m2: 21.6
        fixed_wing_uav_1m2: 25.3
        vehicle_2m2: 30.0
        boat_10m2: 45.0
      notes:
        - "Detection performance varies with environment, target aspect and operating conditions."
    performance:
      blind_zone_m: 50
      horizontal_field_of_view_deg: 360
      vertical_field_of_view_deg: 30
      speed_measurement_range_mps:
        min: -150
        max: 150
      rotation_speed_rpm: 30
      rotation_speed_options_rpm:
        - 30
        - 60
      data_update_interval_s: 2
      tracking_capacity:
        tws_count: 300
        tas_count: "N/A"
      accuracy:
        range_m: 5
        azimuth_deg: 0.3
        elevation_deg: 0.5
    coverage:
      azimuth:
        mode: "mechanical"
        coverage_deg: 360
      elevation:
        mode: "electronic"
        coverage_deg: 30
      refresh_rate_s: 2
      instrumented_range_km: 30
    physical:
      deployment_type: "fixed"
      mounting_options:
        - "pole-mounted"
        - "tower-mounted"
      enclosure_rating: "IP65"
      operating_temperature_c:
        min: -40
        max: 55
      dimensions_mm:
        length: 620
        width: 480
        height: 850
      weight_kg: 78
    interfaces:
      power_input: "AC220"
      data_interfaces:
        - "Ethernet"
      power_consumption_w: 650
      protocol_support:
        - "TCP/IP"
        - "custom"
      horizon_compatible: true
      third_party_integration: true
    content:
      summary: "SRC-X08B-1M is an X-band surveillance radar designed for perimeter monitoring and low-altitude target detection."
      key_features:
        - "X-band pulse Doppler architecture"
        - "Mechanical azimuth scan with electronic elevation coverage"
        - "Compatible with Cyrentis Horizon"
    platform_integration:
      compatible_platforms:
        - "Cyrentis Horizon"
      supported_modules:
        - "Horizon Sense"
        - "Horizon Fusion"
        - "Horizon Track"
        - "Horizon Command"
      supports_cueing_to_optics: true
      supports_multi_sensor_fusion: true
