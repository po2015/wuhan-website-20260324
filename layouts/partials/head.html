{{- $defaultDescription := .Site.Params.default_description | default .Site.Home.Params.description -}}
<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ $defaultDescription }}{{ end }}">
  <link rel="icon" type="image/png" href="{{ "images/icon.png" | relURL }}">
  <link rel="shortcut icon" href="{{ "images/icon.png" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef7ff',
              100: '#d9ecff',
              200: '#bcdfff',
              300: '#8fcbff',
              400: '#5eb0ff',
              500: '#2f90ff',
              600: '#1b72e6',
              700: '#1558b4',
              800: '#164a92',
              900: '#173f77'
            }
          },
          boxShadow: {
            soft: '0 8px 30px rgba(15, 23, 42, 0.08)'
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans SC', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
</head>
