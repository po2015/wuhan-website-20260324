{{- $defaultDescription := .Site.Params.default_description | default .Site.Home.Params.description -}}
<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ $defaultDescription }}{{ end }}">
  <link rel="icon" type="image/png" href="{{ "images/icon.png" | relURL }}">
  <link rel="shortcut icon" href="{{ "images/icon.png" | relURL }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef7ff',
              100: '#d9ecff',
              200: '#bcdfff',
              300: '#8fcbff',
              400: '#5eb0ff',
              500: '#2f90ff',
              600: '#1b72e6',
              700: '#1558b4',
              800: '#164a92',
              900: '#173f77'
            }
          },
          boxShadow: {
            soft: '0 8px 30px rgba(15, 23, 42, 0.08)'
          },
          fontFamily: {
            sans: ['Manrope', 'Aptos', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Helvetica Neue', 'Arial', 'sans-serif']
          }
        }
      }
    }
  </script>
  {{ with .Site.Params.google_tag_id }}
  <script>
    window.dataLayer = window.dataLayer || [];
    window.gtag = window.gtag || function(){window.dataLayer.push(arguments);};
    window.gtag('js', new Date());
    window.gtag('config', '{{ . }}');

    (function () {
      var tagId = '{{ . }}';
      var loaded = false;

      function loadGoogleTag() {
        if (loaded) return;
        loaded = true;
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(tagId);
        script.referrerPolicy = 'strict-origin-when-cross-origin';
        script.onerror = function () {};
        document.head.appendChild(script);
      }

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGoogleTag, { timeout: 4000 });
      } else {
        window.addEventListener('load', function () {
          window.setTimeout(loadGoogleTag, 2000);
        }, { once: true });
      }
    })();
  </script>
  {{ end }}
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
</head>
