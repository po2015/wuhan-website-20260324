    <tspan x="586" dy="18">trajectory continuity</tspan>
  </text>
  <circle cx="561" cy="656" r="10" fill="#7A6EFF"/>
  <text x="586" y="662" font-family="Manrope, sans-serif" font-size="16" fill="#5D4E8D">Assistive target interpretation</text>

