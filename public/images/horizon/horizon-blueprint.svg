  <text x="1000" y="232" font-family="Manrope, sans-serif" font-size="14" fill="#8D6837">
    <tspan x="1000" dy="0">Act on events, notify stakeholders,</tspan>
    <tspan x="1000" dy="20">and preserve the record.</tspan>
  </text>
  <rect x="1000" y="286" width="198" height="62" rx="18" fill="white"/>
  <text x="1026" y="324" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#7B4D15">Horizon Command</text>
  <rect x="1000" y="368" width="198" height="62" rx="18" fill="white"/>
  <text x="1026" y="406" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#7B4D15">Horizon Notify</text>
  <rect x="1000" y="450" width="198" height="62" rx="18" fill="white"/>
  <text x="1026" y="488" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#7B4D15">Horizon Archive</text>
  <circle cx="1013" cy="590" r="10" fill="#F0A23D"/>
  <text x="1038" y="596" font-family="Manrope, sans-serif" font-size="16" fill="#866233">Alarm and response workspace</text>
  <circle cx="1013" cy="624" r="10" fill="#F0A23D"/>
  <text x="1038" y="630" font-family="Manrope, sans-serif" font-size="15" fill="#866233">
    <tspan x="1038" dy="0">Alert dispatch and</tspan>
    <tspan x="1038" dy="18">evidence playback</tspan>
  </text>

  <rect x="456" y="728" width="518" height="92" rx="24" fill="url(#link)" stroke="#9FE7BF"/>
  <text x="496" y="774" font-family="Manrope, sans-serif" font-size="22" font-weight="800" fill="#1F6A45">Horizon Link</text>
  <text x="671" y="768" font-family="Manrope, sans-serif" font-size="15" fill="#3B7D58">
    <tspan x="671" dy="0">Interfaces to third-party systems,</tspan>
    <tspan x="671" dy="20">site platforms, and future extensions</tspan>
  </text>

  <path d="M402 348H510" stroke="#70CFFF" stroke-width="5" stroke-linecap="round"/>
  <path d="M402 412H510" stroke="#70CFFF" stroke-width="5" stroke-linecap="round"/>
  <path d="M902 380H966" stroke="#B998FF" stroke-width="5" stroke-linecap="round"/>
  <path d="M902 474H966" stroke="#B998FF" stroke-width="5" stroke-linecap="round"/>
