  <text x="548" y="196" font-family="Manrope, sans-serif" font-size="24" font-weight="800" fill="#392872">Understanding Layer</text>
  <text x="548" y="232" font-family="Manrope, sans-serif" font-size="14" fill="#5B4C8D">
    <tspan x="548" dy="0">Correlation, tracking, and recognition</tspan>
    <tspan x="548" dy="20">build operational awareness.</tspan>
  </text>
  <rect x="548" y="286" width="316" height="68" rx="20" fill="white"/>
  <text x="576" y="327" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#45347F">Horizon Fusion</text>
  <rect x="548" y="380" width="316" height="68" rx="20" fill="white"/>
  <text x="576" y="421" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#45347F">Horizon Track</text>
  <rect x="548" y="474" width="316" height="68" rx="20" fill="white"/>
  <text x="576" y="515" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#45347F">Horizon AI</text>
  <circle cx="561" cy="604" r="10" fill="#7A6EFF"/>
  <text x="586" y="610" font-family="Manrope, sans-serif" font-size="15" fill="#5D4E8D">
