<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bp" x1="97" y1="72" x2="1314" y2="829" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2F8FF"/>
      <stop offset="1" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="sense" x1="120" y1="166" x2="420" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDF7FF"/>
      <stop offset="1" stop-color="#CBE8FF"/>
    </linearGradient>
    <linearGradient id="brain" x1="538" y1="158" x2="918" y2="654" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEE7FF"/>
      <stop offset="1" stop-color="#E1DDFF"/>
    </linearGradient>
    <linearGradient id="ops" x1="966" y1="172" x2="1273" y2="648" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF1D8"/>
