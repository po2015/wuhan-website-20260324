  <rect width="1400" height="920" rx="36" fill="url(#bp)"/>
  <rect x="84" y="82" width="1248" height="756" rx="30" fill="white" stroke="#D7E3F0"/>

  <rect x="120" y="144" width="282" height="408" rx="28" fill="url(#sense)" stroke="#9EDBFF"/>
  <text x="156" y="196" font-family="Manrope, sans-serif" font-size="24" font-weight="800" fill="#0F2F47">Sensing Inputs</text>
  <text x="156" y="232" font-family="Manrope, sans-serif" font-size="14" fill="#3E627E">
    <tspan x="156" dy="0">Radar, electro-optical, and RF</tspan>
    <tspan x="156" dy="20">devices enter one software context.</tspan>
  </text>
  <rect x="156" y="284" width="210" height="62" rx="18" fill="white"/>
  <text x="181" y="322" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#184D73">Horizon Sense</text>
  <rect x="156" y="368" width="210" height="62" rx="18" fill="white"/>
  <text x="181" y="406" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#184D73">Horizon Spatial</text>
  <circle cx="156" cy="493" r="10" fill="#35BFEF"/>
  <text x="181" y="499" font-family="Manrope, sans-serif" font-size="16" fill="#315874">Coverage context</text>
  <circle cx="156" cy="527" r="10" fill="#35BFEF"/>
  <text x="181" y="533" font-family="Manrope, sans-serif" font-size="16" fill="#315874">Device health and status</text>

