<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none" role="img" aria-label="Dual-use export compliance process flow">
  <rect width="1200" height="760" fill="#F8FAFC"/>
  <rect x="56" y="48" width="1088" height="664" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="96" y="106" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0F172A">Dual-Use Export Compliance Flow (Civil Security Radar)</text>
  <text x="96" y="142" font-family="Arial, sans-serif" font-size="20" fill="#475569">High-level process for legal export readiness and project delivery timing.</text>

  <g transform="translate(100 210)">
    <rect x="0" y="0" width="210" height="96" rx="14" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="105" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1E3A8A" text-anchor="middle">1. End-Use Review</text>
    <text x="105" y="68" font-family="Arial, sans-serif" font-size="14" fill="#334155" text-anchor="middle">Civil security scope check</text>
  </g>

  <g transform="translate(360 210)">
    <rect x="0" y="0" width="210" height="96" rx="14" fill="#ECFEFF" stroke="#A5F3FC"/>
    <text x="105" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#155E75" text-anchor="middle">2. Technical Dossier</text>
    <text x="105" y="68" font-family="Arial, sans-serif" font-size="14" fill="#334155" text-anchor="middle">Specs and buyer details</text>
  </g>

  <g transform="translate(620 210)">
    <rect x="0" y="0" width="210" height="96" rx="14" fill="#F0FDF4" stroke="#BBF7D0"/>
    <text x="105" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534" text-anchor="middle">3. License Filing</text>
    <text x="105" y="68" font-family="Arial, sans-serif" font-size="14" fill="#334155" text-anchor="middle">Application submission</text>
  </g>

  <g transform="translate(880 210)">
    <rect x="0" y="0" width="210" height="96" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="105" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412" text-anchor="middle">4. Customs / Shipment</text>
    <text x="105" y="68" font-family="Arial, sans-serif" font-size="14" fill="#334155" text-anchor="middle">Post-license execution</text>
  </g>

  <path d="M310 258H350" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M570 258H610" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M830 258H870" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M340 252L350 258L340 264" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M600 252L610 258L600 264" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M860 252L870 258L860 264" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="100" y="370" width="990" height="280" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="130" y="418" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A">Typical Document Set (Project-Specific)</text>
  <text x="130" y="458" font-family="Arial, sans-serif" font-size="17" fill="#334155">• End-user statement and non-reexport commitment</text>
  <text x="130" y="490" font-family="Arial, sans-serif" font-size="17" fill="#334155">• Product technical description and declared civil security purpose</text>
  <text x="130" y="522" font-family="Arial, sans-serif" font-size="17" fill="#334155">• Contract/commercial invoice and destination information</text>
  <text x="130" y="554" font-family="Arial, sans-serif" font-size="17" fill="#334155">• Integrator and installation project scope documents</text>
  <text x="130" y="602" font-family="Arial, sans-serif" font-size="16" fill="#64748B">Note: Exact requirements depend on destination, product parameters, and current regulations.</text>
</svg>
